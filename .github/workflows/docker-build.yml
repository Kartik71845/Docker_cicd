name: Docker CI/CD

on:
  push:
    branches:
      - test
    paths:
      - dockerfile
      - app.js
      - docker-compose.yml
      - .github/workflows/docker-build.yml
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t dockerized_app:test -f dockerfile .

      - name: Test container
        run: |
          docker run -d -p 3000:3000 --name test-app dockerized_app:test
          sleep 5
          curl --fail http://127.0.0.1:3000
          docker logs test-app

      - name: Cleanup test container
        if: always()
        run: docker rm -f test-app || true

      - name: Tag image
        run: |
          docker tag dockerized_app:test ${{ secrets.DOCKERHUB_USERNAME }}/dockerized_app:latest
          docker tag dockerized_app:test ${{ secrets.DOCKERHUB_USERNAME }}/dockerized_app:${{ github.sha }}

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dockerized_app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dockerized_app:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          cat > ssm-commands.json <<EOF
          {
            "commands": [
              "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/dockerized_app:latest",
              "docker stop app || true",
              "docker rm app || true",
              "docker run -d -p 3000:3000 --name app ${{ secrets.DOCKERHUB_USERNAME }}/dockerized_app:latest"
            ]
          }
          EOF

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $CMD_ID"

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.INSTANCE_ID }}"
